name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main  # or your active development branch
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: # Allows you to run this manually from the GitHub 'Actions' tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy create-order --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy verify-payment --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}